    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    chart: ai-gateway-helm
    repoURL: registry-1.docker.io/envoyproxy
    targetRevision: v0.5.0
    helm:
      values: |
        # 必要に応じてカスタムvalues
        # extProc:
        #   extraEnvVars:
        #     - name: OTEL_EXPORTER_OTLP_ENDPOINT
        #       value: "http://otel-collector:4317"
  destination:

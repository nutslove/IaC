    chart: ai-gateway-crds-helm
    repoURL: registry-1.docker.io/envoyproxy
    targetRevision: v0.5.0
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway-system
  syncPolicy:
    automated:
      prune: true
